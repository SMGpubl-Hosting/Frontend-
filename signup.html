<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="SMGPUB — Music publishing platform, beat licensing, and digital creator tools.">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup | SMGPUB℠</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>SMGPUB Platform</h1>

<section style="max-width:400px; margin:auto; padding:80px 20px;">

<h2>Create Account</h2>

<input id="email" ="Enter your email address">
<input id="password" type="password" ="Password">

<button class="btn" onclick="signup()">Sign Up</button>

<p style="margin-top:10px;">
  Already have an account? <a href="login.html">Login</a>
</p>

</section>

<script>

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch('/api/signup', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.success){
    alert("Account created!");
    window.location.href = "login.html";
  } else {
    alert("Signup failed");
  }
}

</script>

</body>
</html>
