<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="SMGPUB — Music publishing platform, beat licensing, and digital creator tools.">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SMGPUB℠</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>SMGPUB Platform</h1>

<section style="max-width:400px; margin:auto; padding:80px 20px;">

<h2>Login</h2>

<input id="email" ="Enter your email address">
<input id="password" type="password" ="Password">

<button class="btn" onclick="login()">Login</button>

<p style="margin-top:10px;">
  Don't have an account? <a href="signup.html">Sign up</a>
</p>

</section>

<script>

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch('/api/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    window.location.href = "dashboard.html";
  } else {
    alert("Login failed");
  }
}

</script>

</body>
</html>
